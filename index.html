<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>迷宫小游戏 · 动态重生</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(145deg, #1e2b3c, #0f1722);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 16px;
        }
        .game-container {
            background: #283b4e;
            padding: 24px 20px 30px;
            border-radius: 56px 56px 48px 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.7), inset 0 2px 4px rgba(255,255,255,0.08);
            max-width: 500px;
            width: 100%;
            transition: all 0.2s;
        }
        .maze-wrapper {
            background: #1f2e3d;
            border-radius: 32px;
            padding: 16px;
            box-shadow: inset 0 6px 10px rgba(0,0,0,0.6);
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
            background: #1a2633;
            border-radius: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            touch-action: none;
            cursor: pointer;
        }
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 18px 6px 10px 6px;
            color: #c8dbe9;
            font-weight: 500;
            letter-spacing: 0.3px;
        }
        .status-bar span {
            background: #1f2d3b;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.95rem;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
            backdrop-filter: blur(2px);
        }
        .win-message {
            background: #48b87c;
            color: #0d1f14;
            font-weight: 600;
            padding: 6px 18px;
            border-radius: 40px;
            transition: 0.2s;
            box-shadow: 0 0 12px #48b87c88;
        }
        .control-panel {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 18px;
            padding: 6px 8px;
        }
        .control-btn {
            background: #314b61;
            border: none;
            border-radius: 60px;
            padding: 18px 0;
            font-size: 2.2rem;
            font-weight: 600;
            color: #e3f0fa;
            box-shadow: 0 6px 0 #0f1a24, 0 10px 20px rgba(0,0,0,0.5);
            transition: all 0.05s ease;
            touch-action: manipulation;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            line-height: 1;
            text-shadow: 0 2px 2px rgba(0,0,0,0.3);
            letter-spacing: 2px;
        }
        .control-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #0f1a24, 0 8px 16px rgba(0,0,0,0.6);
        }
        .control-btn.empty {
            background: transparent;
            box-shadow: none;
            pointer-events: none;
        }
        .control-btn.up { grid-column: 2; }
        .control-btn.left { grid-column: 1; grid-row: 2; }
        .control-btn.right { grid-column: 3; grid-row: 2; }
        .control-btn.down { grid-column: 2; grid-row: 3; }

        .reset-btn {
            background: #4f3f5e;
            box-shadow: 0 6px 0 #2d2137, 0 8px 18px rgba(0,0,0,0.5);
            color: #f2e7ff;
            font-size: 1.6rem;
            padding: 12px;
            border-radius: 60px;
            border: none;
            width: 100%;
            margin-top: 12px;
            transition: 0.05s linear;
            cursor: pointer;
            font-weight: 500;
            letter-spacing: 1px;
        }
        .reset-btn:active {
            transform: translateY(5px);
            box-shadow: 0 1px 0 #2d2137, 0 8px 18px rgba(0,0,0,0.5);
        }

        @media (max-width: 480px) {
            .game-container { padding: 16px 12px 20px; }
            .control-btn { padding: 14px 0; font-size: 2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="maze-wrapper">
        <canvas id="mazeCanvas" width="400" height="400"></canvas>
    </div>
    <div class="status-bar">
        <span id="stepDisplay">🚀 0</span>
        <span id="winDisplay" class="win-message" style="background: #3d5a6d; color: #bdd6e8;">✦ 闯关</span>
    </div>
    <div class="control-panel">
        <button class="control-btn up" data-dir="up">▲</button>
        <button class="control-btn left" data-dir="left">◀</button>
        <button class="control-btn right" data-dir="right">▶</button>
        <button class="control-btn down" data-dir="down">▼</button>
        <div class="control-btn empty"></div>
        <div class="control-btn empty"></div>
    </div>
    <button class="reset-btn" id="resetGameBtn">🔄 新地图</button>
</div>
<script>
    (function() {
        // ---------- 迷宫核心参数 ----------
        const SIZE = 11;                // 奇数保证起点/终点在边缘且通路流畅
        const CELL_SIZE = 400 / SIZE;   // ~36.36px

        const canvas = document.getElementById('mazeCanvas');
        const ctx = canvas.getContext('2d');
        const stepSpan = document.getElementById('stepDisplay');
        const winSpan = document.getElementById('winDisplay');

        // 状态变量
        let maze = [];                 // 二维: 0墙 1路
        let player = { x: 1, y: 1 };   // 起点 (1,1)
        let end = { x: SIZE-2, y: SIZE-2 }; // 终点 (SIZE-2, SIZE-2)
        let steps = 0;
        let gameWin = false;

        // ---------- 迷宫生成 (深度优先 + 随机) ----------
        function generateMaze() {
            // 初始化全墙 (0)
            maze = Array.from({ length: SIZE }, () => Array(SIZE).fill(0));

            // 从 (1,1) 开始挖路 (奇数坐标)
            function carve(x, y) {
                maze[y][x] = 1; // 标记为路
                // 四个方向随机顺序
                const dirs = [
                    [0, -2], [0, 2],  // 上下
                    [-2, 0], [2, 0]   // 左右
                ];
                shuffleArray(dirs);
                for (let [dx, dy] of dirs) {
                    const nx = x + dx;
                    const ny = y + dy;
                    if (nx > 0 && nx < SIZE-1 && ny > 0 && ny < SIZE-1 && maze[ny][nx] === 0) {
                        // 打通中间墙
                        maze[y + dy/2][x + dx/2] = 1;
                        carve(nx, ny);
                    }
                }
            }

            // 洗牌函数
            function shuffleArray(arr) {
                for (let i = arr.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [arr[i], arr[j]] = [arr[j], arr[i]];
                }
                return arr;
            }

            // 从 (1,1) 开始生成
            carve(1, 1);

            // 确保终点 (SIZE-2, SIZE-2) 是路 (可能被墙覆盖, 强制设为路)
            maze[SIZE-2][SIZE-2] = 1;
            // 如果终点旁边是墙, 额外打通 (避免孤立)
            const endX = SIZE-2, endY = SIZE-2;
            // 检查终点四周是否至少有一格路, 如果没有则打通一个方向
            const neighbors = [
                [endX-1, endY], [endX+1, endY], [endX, endY-1], [endX, endY+1]
            ];
            let hasRoadNeighbor = false;
            for (let [nx, ny] of neighbors) {
                if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE && maze[ny][nx] === 1) {
                    hasRoadNeighbor = true;
                    break;
                }
            }
            if (!hasRoadNeighbor) {
                // 随机打通一个相邻墙 (优先向上或左)
                const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                shuffleArray(dirs);
                for (let [dx, dy] of dirs) {
                    const nx = endX + dx;
                    const ny = endY + dy;
                    if (nx >= 0 && nx < SIZE && ny >= 0 && ny < SIZE) {
                        maze[ny][nx] = 1;
                        break;
                    }
                }
            }

            // 额外保证起点 (1,1) 为路 (已经确保)
            maze[1][1] = 1;

            // 重置玩家到起点
            player.x = 1;
            player.y = 1;
            steps = 0;
            gameWin = false;
            winSpan.textContent = '✦ 闯关';
            winSpan.style.background = '#3d5a6d';
            winSpan.style.color = '#bdd6e8';
            stepSpan.textContent = '🚀 0';
        }

        // ---------- 绘制迷宫 ----------
        function drawMaze() {
            ctx.clearRect(0, 0, 400, 400);

            // 绘制网格
            for (let row = 0; row < SIZE; row++) {
                for (let col = 0; col < SIZE; col++) {
                    const x = col * CELL_SIZE;
                    const y = row * CELL_SIZE;
                    if (maze[row][col] === 1) {
                        // 路: 浅色
                        ctx.fillStyle = '#dae3ed';
                        ctx.fillRect(x, y, CELL_SIZE-0.5, CELL_SIZE-0.5);
                    } else {
                        // 墙: 深色
                        ctx.fillStyle = '#1f2c3b';
                        ctx.fillRect(x, y, CELL_SIZE-0.5, CELL_SIZE-0.5);
                    }
                }
            }

            // 绘制终点 (旗帜)
            const endX = end.x * CELL_SIZE + CELL_SIZE/2;
            const endY = end.y * CELL_SIZE + CELL_SIZE/2 - 2;
            ctx.shadowColor = '#ffd966';
            ctx.shadowBlur = 12;
            // 旗杆
            ctx.beginPath();
            ctx.strokeStyle = '#f0e6d2';
            ctx.lineWidth = 3;
            ctx.moveTo(endX, endY - 12);
            ctx.lineTo(endX, endY + 8);
            ctx.stroke();
            // 旗帜
            ctx.fillStyle = '#f7c948';
            ctx.shadowBlur = 16;
            ctx.beginPath();
            ctx.moveTo(endX, endY - 12);
            ctx.lineTo(endX + 14, endY - 6);
            ctx.lineTo(endX, endY);
            ctx.closePath();
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';

            // 绘制玩家 (小圆球 + 高光)
            const px = player.x * CELL_SIZE + CELL_SIZE/2;
            const py = player.y * CELL_SIZE + CELL_SIZE/2;
            // 发光
            const gradient = ctx.createRadialGradient(px-4, py-4, 2, px, py, 18);
            gradient.addColorStop(0, '#b3e5ff');
            gradient.addColorStop(0.6, '#4db8ff');
            gradient.addColorStop(1, '#0066b0');
            ctx.shadowColor = '#4db8ff';
            ctx.shadowBlur = 22;
            ctx.beginPath();
            ctx.arc(px, py, 12, 0, 2 * Math.PI);
            ctx.fillStyle = gradient;
            ctx.fill();
            // 高光
            ctx.shadowBlur = 6;
            ctx.beginPath();
            ctx.arc(px-4, py-5, 4, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
        }

        // ---------- 移动逻辑 ----------
        function movePlayer(dx, dy) {
            if (gameWin) return false; // 已通关不可移动 (但可重置)

            const newX = player.x + dx;
            const newY = player.y + dy;

            // 边界 & 墙检测
            if (newX < 0 || newX >= SIZE || newY < 0 || newY >= SIZE) return false;
            if (maze[newY][newX] !== 1) return false;

            // 执行移动
            player.x = newX;
            player.y = newY;
            steps++;
            stepSpan.textContent = `🚀 ${steps}`;

            // 检查是否到达终点
            if (player.x === end.x && player.y === end.y) {
                gameWin = true;
                winSpan.textContent = '🎉 通关!';
                winSpan.style.background = '#48b87c';
                winSpan.style.color = '#0d1f14';
                // 额外闪烁效果 (可忽略)
            }

            drawMaze();
            return true;
        }

        // ---------- 重置游戏 (新地图) ----------
        function resetGame() {
            generateMaze();
            // 重置终点 (固定为 SIZE-2, SIZE-2)
            end = { x: SIZE-2, y: SIZE-2 };
            // 保证终点是路 (生成时已保证)
            drawMaze();
            stepSpan.textContent = '🚀 0';
            winSpan.textContent = '✦ 闯关';
            winSpan.style.background = '#3d5a6d';
            winSpan.style.color = '#bdd6e8';
            gameWin = false;
        }

        // ---------- 事件绑定 ----------
        function setupControls() {
            // 方向按钮
            document.querySelectorAll('.control-btn[data-dir]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const dir = e.currentTarget.dataset.dir;
                    switch (dir) {
                        case 'up': movePlayer(0, -1); break;
                        case 'down': movePlayer(0, 1); break;
                        case 'left': movePlayer(-1, 0); break;
                        case 'right': movePlayer(1, 0); break;
                    }
                });
                // 防止触控时页面缩放/滚动
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                });
            });

            // 键盘支持 (可选)
            document.addEventListener('keydown', (e) => {
                const key = e.key;
                if (key === 'ArrowUp') { e.preventDefault(); movePlayer(0, -1); }
                else if (key === 'ArrowDown') { e.preventDefault(); movePlayer(0, 1); }
                else if (key === 'ArrowLeft') { e.preventDefault(); movePlayer(-1, 0); }
                else if (key === 'ArrowRight') { e.preventDefault(); movePlayer(1, 0); }
                else if (key === 'r' || key === 'R') { resetGame(); }
            });

            // 重置按钮
            document.getElementById('resetGameBtn').addEventListener('click', resetGame);
            document.getElementById('resetGameBtn').addEventListener('touchstart', (e) => {
                e.preventDefault();
                resetGame();
            });
        }

        // ---------- 初始化 ----------
        function init() {
            generateMaze();
            drawMaze();
            setupControls();
        }

        init();
    })();
</script>
</body>
</html>
